repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: [ --branch, main ]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      # Allow this highly trusted tool to modify files before commit
      - id: ruff-check
        entry: sh -c 'ruff check --fix --force-exclude "$@" && git add "$@"'
      - id: ruff-format
        entry: sh -c 'ruff format --force-exclude "$@" && git add "$@"'


  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.408
    hooks:
      - id: pyright

  - repo: https://github.com/facebook/pyrefly-pre-commit
    rev: 0.56.0  # hook version, not pyrefly version
    hooks:
      - id: pyrefly-check
        name: Pyrefly (type checking)
        pass_filenames: false  # It's fast. Check all files.
        language: system  # Use system-installed pyrefly
